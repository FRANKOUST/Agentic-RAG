<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Curator - RAG Workbench</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand-row">
            <img class="brand-logo" src="/static/assets/brand-logo.png" alt="The Curator" />
            <div>
              <h1 class="brand-title">The Curator</h1>
              <p class="brand-subtitle">RAG Workbench</p>
            </div>
          </div>

          <div class="sidebar-status">
            <span class="status-dot"></span>
            <span>Ready for grounded research</span>
          </div>

          <button id="upload-btn" class="upload-button" type="button">
            <span class="icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M10 13V4.5M10 4.5L6.75 7.75M10 4.5L13.25 7.75M4.5 12.75V14.25C4.5 15.2165 5.2835 16 6.25 16H13.75C14.7165 16 15.5 15.2165 15.5 14.25V12.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Upload Document</span>
          </button>
          <input id="upload-input" class="hidden-input" type="file" accept="application/pdf" />

          <div class="kb-panel">
            <div class="section-label">Indexed Sources</div>
            <div id="kb-status" class="kb-status"></div>
            <div class="panel-actions">
              <button id="reindex-btn" class="ghost-button" type="button">Rebuild Index</button>
            </div>
          </div>
        </div>

        <div class="sidebar-nav">
          <div class="sidebar-nav-header">
            <div class="section-label">Recent Chats</div>
            <button id="new-session-btn" class="mini-action" type="button" aria-label="New session">
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M10 4.25V15.75M4.25 10H15.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div id="session-list" class="session-list"></div>
        </div>

        <div class="sidebar-footer">
          <button class="settings-row" type="button">
            <span class="icon-wrap" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M8.42 3.66C8.72 2.78 9.96 2.78 10.26 3.66L10.48 4.32C10.68 4.93 11.24 5.34 11.87 5.34H12.57C13.5 5.34 13.88 6.53 13.13 7.07L12.56 7.49C12.05 7.86 11.83 8.52 12.04 9.13L12.26 9.79C12.56 10.67 11.55 11.41 10.8 10.87L10.23 10.45C9.72 10.08 9.04 10.08 8.53 10.45L7.96 10.87C7.21 11.41 6.2 10.67 6.5 9.79L6.72 9.13C6.93 8.52 6.71 7.86 6.2 7.49L5.63 7.07C4.88 6.53 5.26 5.34 6.19 5.34H6.89C7.52 5.34 8.08 4.93 8.28 4.32L8.42 3.66Z" stroke="currentColor" stroke-width="1.25"/>
                <path d="M10 8.3C10.94 8.3 11.7 9.06 11.7 10C11.7 10.94 10.94 11.7 10 11.7C9.06 11.7 8.3 10.94 8.3 10C8.3 9.06 9.06 8.3 10 8.3Z" stroke="currentColor" stroke-width="1.25"/>
              </svg>
            </span>
            <span>System Settings</span>
          </button>
          <div class="profile-card">
            <img class="profile-avatar" src="/static/assets/user-profile.png" alt="User profile" />
            <div>
              <div class="profile-name">Researcher</div>
              <div class="profile-plan">Local Instance</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main-shell">
        <div class="workspace-meta">
          <div class="workspace-title-wrap">
            <div id="session-title" class="workspace-title">Project Alpha</div>
            <div class="workspace-subtitle">Source-grounded answers with traceable retrieval</div>
          </div>
          <div class="workspace-controls">
            <label>
              <span class="control-label">Mode</span>
              <select id="mode-select">
                <option value="two-step">two-step</option>
                <option value="agentic" selected>agentic</option>
                <option value="corrective">corrective</option>
                <option value="hybrid">hybrid</option>
              </select>
            </label>
            <label>
              <span class="control-label">Search</span>
              <select id="search-mode-select">
                <option value="balanced" selected>balanced</option>
                <option value="semantic">semantic</option>
                <option value="keyword">keyword</option>
                <option value="exact">exact</option>
              </select>
            </label>
            <div id="run-status" class="run-status">Ready</div>
          </div>
        </div>

        <header class="stream-header">
          <div class="date-line"></div>
          <div id="session-date-marker" class="date-marker">Session Started</div>
          <div class="date-line"></div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <div class="composer-wrap">
          <div class="composer-shell">
            <button class="composer-icon subtle" type="button" aria-label="Prompt helpers">
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M10 4.25V15.75M4.25 10H15.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <label class="composer-input-wrap">
              <span class="sr-only">Message input</span>
              <textarea id="message-input" rows="1" placeholder="Ask anything about Project Alpha..."></textarea>
            </label>
            <div class="composer-tools">
              <button class="composer-icon subtle" type="button" aria-label="Voice input">
                <svg viewBox="0 0 20 20" fill="none">
                  <path d="M10 3.75C11.2426 3.75 12.25 4.75736 12.25 6V9C12.25 10.2426 11.2426 11.25 10 11.25C8.75736 11.25 7.75 10.2426 7.75 9V6C7.75 4.75736 8.75736 3.75 10 3.75Z" stroke="currentColor" stroke-width="1.4"/>
                  <path d="M5.75 8.75V9.25C5.75 11.5972 7.65279 13.5 10 13.5C12.3472 13.5 14.25 11.5972 14.25 9.25V8.75M10 13.5V16.25M7.75 16.25H12.25" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </button>
              <button id="send-btn" class="composer-icon send" type="button" aria-label="Send message">
                <svg viewBox="0 0 20 20" fill="none">
                  <path d="M4.25 10H15.25M15.25 10L10.75 5.5M15.25 10L10.75 14.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
